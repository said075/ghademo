name: My First Workflow

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List and read files
        run: |
          echo "My first GHA job"
          ls -ltra
          cat README.md

      - name: Generate ASCII Artwork
        run: |
          cat << 'EOF' > dragon.txt
          run: |
                    echo "Generating ASCII artwork..."
                    echo "  _____ _                 _       _   _             "
                    echo " |_   _| |__   __ _ _ __ (_) __ _| |_(_) ___  _ __  "
                    echo "   | | | '_ \ / _\` | '_ \| |/ _\` | __| |/ _ \| '_ \ "
                    echo "   | | | | | | (_| | |_) | | (_| | |_| | (_) | | | |"
                    echo "   |_| |_| |_|\__,_| .__/|_|\__,_|\__|_|\___/|_| |_|"
                    echo "        
          EOF

      - name: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-artwork
          path: dragon.txt

  second_job:
    runs-on: ubuntu-latest
    needs: first_job
    steps:
      - name: Download the artifact
        uses: actions/download-artifact@v4
        with:
          name: dragon-artwork

      - name: Display the ASCII artwork
        run: |
          echo "Displaying the downloaded ASCII artwork:"
          cat dragon.txt
